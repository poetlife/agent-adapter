name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest
    concurrency:
      group: release-${{ github.ref }}
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --locked

      - name: Validate tag matches package version
        run: |
          python - <<'PY'
          import os
          import tomllib
          from pathlib import Path

          data = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          package_version = data["project"]["version"]
          ref_name = os.environ["GITHUB_REF_NAME"]
          expected_tag = f"v{package_version}"

          if ref_name != expected_tag:
              raise SystemExit(
                  f"Release tag {ref_name!r} does not match pyproject version {expected_tag!r}"
              )

          print(f"Validated release tag {ref_name} for package version {package_version}")
          PY

      - name: Run tests
        run: uv run pytest -v

      - name: Build package
        run: uv build

      - name: Verify release artifacts
        run: |
          python - <<'PY'
          from pathlib import Path

          dist_dir = Path("dist")
          wheels = sorted(dist_dir.glob("*.whl"))
          sdists = sorted(dist_dir.glob("*.tar.gz"))

          if len(wheels) != 1 or len(sdists) != 1:
              raise SystemExit(
                  f"Expected exactly one wheel and one sdist, got wheels={wheels}, sdists={sdists}"
              )

          print(f"Wheel: {wheels[0].name}")
          print(f"Sdist: {sdists[0].name}")
          PY

      - name: Smoke test install from wheel
        run: |
          python - <<'PY'
          import subprocess
          import tomllib
          from pathlib import Path

          package_version = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))["project"]["version"]
          wheel = sorted(Path("dist").glob("*.whl"))[0]

          result = subprocess.run(
              ["uv", "tool", "run", "--from", str(wheel), "codex-adapter", "--version"],
              check=True,
              text=True,
              capture_output=True,
          )

          output = (result.stdout + result.stderr).strip()
          print(output)
          if f"version {package_version}" not in output:
              raise SystemExit(
                  f"Expected CLI version {package_version} in smoke-test output, got: {output}"
              )
          PY

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-dist-${{ github.ref_name }}
          path: dist/*
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
          fail_on_unmatched_files: true
